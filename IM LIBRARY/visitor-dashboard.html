<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #1e2a4a; --navy-l: #2c3d6b; --gold: #c9a84c;
  --white: #fff; --gray: #6b7280; --bg: #f0ede8; --ok: #16a34a;
}
body { font-family: Arial, Helvetica, sans-serif; background: var(--bg); min-height: 100vh; }
 
/* NAVBAR */
.navbar {
  background: var(--white); border-bottom: 1.5px solid #e0dcd4;
  height: 64px; display: flex; align-items: center;
  justify-content: space-between; padding: 0 36px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 14px rgba(30,42,74,.08);
}
.nav-l { display: flex; align-items: center; gap: 11px; }
.logo-ring {
  width: 40px; height: 40px; background: var(--navy); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  border: 2.5px solid var(--gold); flex-shrink: 0; overflow: hidden;
}
.logo-ring img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.brand { font-family: Georgia, serif; font-size: 1.05rem; font-weight: 700; color: var(--navy); }
.v-badge {
  font-size: .66rem; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase;
  background: rgba(201,168,76,.14); color: var(--gold);
  border: 1px solid rgba(201,168,76,.38); padding: 3px 11px; border-radius: 20px;
}
.v-badge.faculty  { background: rgba(16,163,74,.12); color: #16a34a; border-color: rgba(16,163,74,.35); }
.v-badge.employee { background: rgba(146,64,14,.10);  color: #92400e; border-color: rgba(146,64,14,.30); }
 
.nav-date { font-size: .9rem; color: var(--gray); font-weight: 500; }
.nav-r { display: flex; align-items: center; gap: 14px; }
.nav-email { font-size: .83rem; color: var(--gray); }
.btn-out {
  border: 1.5px solid #dc2626; color: #dc2626; background: none;
  padding: 7px 20px; border-radius: 8px; font-size: .83rem; font-weight: 600;
  cursor: pointer; transition: all .2s;
}
.btn-out:hover { background: #dc2626; color: #fff; }
 
/* MAIN */
.main { padding: 38px 24px 80px; max-width: 820px; margin: 0 auto; }
 
.card {
  background: var(--white); border-radius: 20px;
  box-shadow: 0 8px 32px rgba(30,42,74,.1); padding: 44px 48px;
}
.card-title { font-family: Georgia, serif; font-size: 1.7rem; font-weight: 700; color: var(--navy); margin-bottom: 6px; }
.card-role-sub {
  font-size: .82rem; color: var(--gray); margin-bottom: 30px;
  display: flex; align-items: center; gap: 7px; flex-wrap: wrap;
}
.role-chip {
  display: inline-block; font-size: .68rem; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  padding: 3px 10px; border-radius: 20px;
}
.role-chip.student  { background: #dbeafe; color: #1d4ed8; }
.role-chip.faculty  { background: #d1fae5; color: #065f46; }
.role-chip.employee { background: #fef3c7; color: #92400e; }
 
.sec-lbl { font-size: .68rem; font-weight: 700; letter-spacing: 1.8px; color: var(--gray); text-transform: uppercase; margin-bottom: 14px; }
 
/* INFO GRID */
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 38px; }
.i-cell { background: #f7f5f1; border: 1.5px solid #e8e4dc; border-radius: 13px; padding: 16px 20px; }
.i-lbl { font-size: .66rem; font-weight: 700; letter-spacing: 1.3px; color: #9ca3af; text-transform: uppercase; margin-bottom: 6px; }
.i-val { font-size: .97rem; font-weight: 700; color: var(--navy); word-break: break-word; line-height: 1.4; }
 
/* PURPOSE GRID */
.pur-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 30px; }
.pur-btn {
  background: var(--white); border: 1.5px solid #d9d5ce; border-radius: 15px;
  padding: 28px 14px 22px; display: flex; flex-direction: column;
  align-items: center; gap: 12px; cursor: pointer; transition: all .22s; outline: none;
}
.pur-btn:hover { border-color: var(--navy); box-shadow: 0 4px 16px rgba(30,42,74,.13); transform: translateY(-2px); }
.pur-btn.sel { background: var(--navy-l); border-color: var(--navy); box-shadow: 0 4px 18px rgba(30,42,74,.13); }
.pur-btn.sel .p-lbl { color: #fff; }
.p-ico { font-size: 2.1rem; line-height: 1; }
.p-lbl { font-size: .88rem; font-weight: 600; color: var(--navy); transition: color .22s; }
 
/* RECORD BUTTON */
.btn-rec {
  width: 100%; padding: 18px; background: var(--navy); color: var(--gold);
  border: none; border-radius: 13px; font-size: 1rem; font-weight: 700;
  letter-spacing: 1.1px; cursor: pointer; transition: all .22s;
  box-shadow: 0 4px 18px rgba(30,42,74,.22);
}
.btn-rec:hover { background: var(--navy-l); box-shadow: 0 6px 22px rgba(30,42,74,.3); }
.btn-rec:disabled { background: #c5c0b8; color: #e8e4dc; cursor: not-allowed; box-shadow: none; }
.btn-rec.done { background: var(--ok) !important; color: #fff; cursor: default; letter-spacing: .3px; }
 
/* TOAST */
#toast {
  position: fixed; top: 22px; left: 50%;
  transform: translateX(-50%) translateY(-90px);
  padding: 13px 28px; border-radius: 10px; font-size: .87rem; font-weight: 700;
  color: #fff; background: var(--ok); box-shadow: 0 4px 22px rgba(0,0,0,.2);
  z-index: 9999; transition: transform .35s cubic-bezier(.34,1.56,.64,1); white-space: nowrap;
}
#toast.show { transform: translateX(-50%) translateY(0); }
#toast.err  { background: #dc2626; }
 
@media (max-width: 620px) {
  .card { padding: 26px 18px; }
  .info-grid { grid-template-columns: 1fr; }
  .navbar { padding: 0 16px; }
  .nav-email { display: none; }
  .pur-grid  { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>
<div id="toast"></div>
 
<nav class="navbar">
  <div class="nav-l">
    <div class="logo-ring">
      <img src="logo.png" alt="NEU Logo"/>
    </div>
    <span class="brand">NEU Library</span>
    <span class="v-badge" id="nav-badge">Visitor</span>
  </div>
  <div class="nav-date" id="nav-date"></div>
  <div class="nav-r">
    <span class="nav-email" id="nav-email"></span>
    <button class="btn-out" onclick="logout()">Logout</button>
  </div>
</nav>
 
<div class="main">
  <div class="card">
    <h2 class="card-title" id="card-title">Welcome to NEU Library!</h2>
    <div class="card-role-sub" id="card-role-sub"></div>
 
    <div class="sec-lbl">Your Information</div>
 
    <!-- STUDENT INFO -->
    <div class="info-grid" id="info-student" style="display:none">
      <div class="i-cell"><div class="i-lbl">Full Name</div><div class="i-val" id="s-name">—</div></div>
      <div class="i-cell"><div class="i-lbl">Student ID</div><div class="i-val" id="s-id">—</div></div>
      <div class="i-cell"><div class="i-lbl">Course / Program</div><div class="i-val" id="s-course">—</div></div>
      <div class="i-cell"><div class="i-lbl">College</div><div class="i-val" id="s-dept">—</div></div>
    </div>
 
    <!-- FACULTY INFO -->
    <div class="info-grid" id="info-faculty" style="display:none">
      <div class="i-cell"><div class="i-lbl">Full Name</div><div class="i-val" id="f-name">—</div></div>
      <div class="i-cell"><div class="i-lbl">Faculty ID</div><div class="i-val" id="f-id">—</div></div>
      <div class="i-cell"><div class="i-lbl">Program / Specialization</div><div class="i-val" id="f-course">—</div></div>
      <div class="i-cell"><div class="i-lbl">College / Department</div><div class="i-val" id="f-dept">—</div></div>
    </div>
 
    <!-- EMPLOYEE INFO -->
    <div class="info-grid" id="info-employee" style="display:none">
      <div class="i-cell"><div class="i-lbl">Full Name</div><div class="i-val" id="e-name">—</div></div>
      <div class="i-cell"><div class="i-lbl">Employee ID</div><div class="i-val" id="e-id">—</div></div>
      <div class="i-cell"><div class="i-lbl">Position / Job Title</div><div class="i-val" id="e-pos">—</div></div>
      <div class="i-cell"><div class="i-lbl">Office / Department</div><div class="i-val" id="e-dept">—</div></div>
    </div>
 
    <div class="sec-lbl">Purpose of Visit</div>
    <div class="pur-grid">
      <button class="pur-btn" onclick="pick(this,'Study')">        <span class="p-ico">📋</span><span class="p-lbl">Study</span></button>
      <button class="pur-btn" onclick="pick(this,'Research')">     <span class="p-ico">🔍</span><span class="p-lbl">Research</span></button>
      <button class="pur-btn" onclick="pick(this,'Borrow Books')"> <span class="p-ico">📚</span><span class="p-lbl">Borrow Books</span></button>
      <button class="pur-btn" onclick="pick(this,'Return Books')"> <span class="p-ico">↩️</span><span class="p-lbl">Return Books</span></button>
      <button class="pur-btn" onclick="pick(this,'Internet Use')"> <span class="p-ico">🖥️</span><span class="p-lbl">Internet Use</span></button>
      <button class="pur-btn" onclick="pick(this,'Group Study')">  <span class="p-ico">👥</span><span class="p-lbl">Group Study</span></button>
    </div>
 
    <button class="btn-rec" id="rec-btn" disabled onclick="doRecord()">⏱ RECORD TIME IN</button>
  </div>
</div>
 
<script>
/* ── AUTH GUARD ── */
let cur = null;
const raw = localStorage.getItem('neu_cur_user');
if (!raw) {
  window.location.href = 'login.html';
} else {
  try {
    cur = JSON.parse(raw);
    if (!cur.email || !cur.fullName) throw 'invalid';
 
    const role = (cur.role || 'Student').toLowerCase();
    const firstName = cur.fullName.includes(',')
      ? cur.fullName.split(',')[1].trim().split(' ')[0]
      : cur.fullName.trim().split(' ')[0];
 
    /* Welcome title */
    document.getElementById('card-title').textContent = 'Welcome to NEU Library!';
 
    /* Role badge */
    const badge   = document.getElementById('nav-badge');
    const roleSub = document.getElementById('card-role-sub');
 
    if (role === 'student') {
      badge.textContent = 'Student';
      badge.className   = 'v-badge';
      roleSub.innerHTML = '<span class="role-chip student">Student</span> ' + (cur.course || '');
    } else if (role === 'faculty') {
      badge.textContent = 'Faculty';
      badge.className   = 'v-badge faculty';
      roleSub.innerHTML = '<span class="role-chip faculty">Faculty</span> ' + (cur.department || '');
    } else if (role === 'employee') {
      badge.textContent = 'Employee';
      badge.className   = 'v-badge employee';
      roleSub.innerHTML = '<span class="role-chip employee">Employee</span> '
        + (cur.position || '') + (cur.department ? ' &middot; ' + cur.department : '');
    }
 
    /* Show correct info grid */
    ['info-student', 'info-faculty', 'info-employee'].forEach(id =>
      document.getElementById(id).style.display = 'none');
 
    if (role === 'student') {
      document.getElementById('info-student').style.display = 'grid';
      document.getElementById('s-name').textContent   = cur.fullName   || '—';
      document.getElementById('s-id').textContent     = cur.idNumber   || '—';
      document.getElementById('s-course').textContent = cur.course     || '—';
      document.getElementById('s-dept').textContent   = cur.department || '—';
    } else if (role === 'faculty') {
      document.getElementById('info-faculty').style.display = 'grid';
      document.getElementById('f-name').textContent   = cur.fullName   || '—';
      document.getElementById('f-id').textContent     = cur.idNumber   || '—';
      document.getElementById('f-course').textContent = cur.course     || '—';
      document.getElementById('f-dept').textContent   = cur.department || '—';
    } else if (role === 'employee') {
      document.getElementById('info-employee').style.display = 'grid';
      document.getElementById('e-name').textContent = cur.fullName   || '—';
      document.getElementById('e-id').textContent   = cur.idNumber   || '—';
      document.getElementById('e-pos').textContent  = cur.position   || '—';
      document.getElementById('e-dept').textContent = cur.department || '—';
    }
 
    document.getElementById('nav-email').textContent = cur.email || '';
 
  } catch {
    localStorage.removeItem('neu_cur_user');
    window.location.href = 'login.html';
  }
}
 
document.getElementById('nav-date').textContent =
  new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
 
/* ── TOAST ── */
function toast(msg, err = false) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = err ? 'show err' : 'show';
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 3200);
}
 
/* ── PURPOSE SELECTION ── */
let purpose = null;
function pick(btn, label) {
  document.querySelectorAll('.pur-btn').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
  purpose = label;
  const rb = document.getElementById('rec-btn');
  rb.disabled   = false;
  rb.className  = 'btn-rec';
  rb.textContent = '⏱ RECORD TIME IN';
}
 
/* ── RECORD TIME IN → SUPABASE ── */
async function doRecord() {
  if (!purpose || !cur) return;
 
  const rb = document.getElementById('rec-btn');
  rb.disabled   = true;
  rb.textContent = 'Recording…';
 
  const now  = new Date();
  const role = (cur.role || 'Student');
 
  const entry = {
    date_time:    now.toISOString(),
    display_time: now.toLocaleString('en-US', {
      month: 'short', day: 'numeric', year: 'numeric',
      hour: 'numeric', minute: '2-digit', hour12: true
    }),
    full_name:  cur.fullName,
    email:      cur.email,
    id_number:  cur.idNumber,
    user_type:  role,
    college:    cur.department,
    course:     role.toLowerCase() === 'employee'
                  ? (cur.position || 'N/A')
                  : (cur.course   || 'N/A'),
    reason:     purpose,
    position:   cur.position || null
  };
 
  const { error } = await db.from('neu_logs').insert(entry);
 
  if (error) {
    toast('Failed to record visit. Please try again.', true);
    console.error(error);
    rb.disabled   = false;
    rb.textContent = '⏱ RECORD TIME IN';
    return;
  }
 
  toast('✅ Time In recorded — ' + purpose + '!');
  rb.textContent = '✅ TIME IN RECORDED';
  rb.className   = 'btn-rec done';
  rb.disabled    = true;
  document.querySelectorAll('.pur-btn').forEach(b => b.classList.remove('sel'));
  purpose = null;
}
 
/* ── LOGOUT ── */
function logout() {
  localStorage.removeItem('neu_cur_user');
  window.location.href = 'login.html';
}
</script>
</body>
</html>
