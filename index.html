<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NEU Library – Login</title>

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);
</script>
 
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #1e2a4a; --navy-l: #2c3d6b; --gold: #c9a84c; --gold-dk: #a8863a;
  --white: #fff; --gray: #6b7280; --error: #dc2626; --ok: #16a34a;
}
body {
  font-family: Arial, Helvetica, sans-serif;
  min-height: 100vh;
  background: url('background.jpg') no-repeat center center / cover;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 44px 20px 64px;
}
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 80% 55% at 18% 8%, rgba(201,168,76,.09) 0%, transparent 60%),
    radial-gradient(ellipse 55% 80% at 82% 85%, rgba(201,168,76,.06) 0%, transparent 60%);
}
 
.lh { text-align: center; margin-bottom: 28px; position: relative; z-index: 1; }
.logo-ring {
  width: 76px; height: 76px; background: var(--navy); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 18px; border: 3px solid var(--gold);
  box-shadow: 0 6px 24px rgba(0,0,0,.35); overflow: hidden;
}
.logo-ring img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.lh h1 { font-family: Georgia, serif; font-size: 2.1rem; font-weight: 700; color: #fff; margin-bottom: 7px; }
.lh h1 em { color: var(--gold); font-style: normal; }
.lh .sub { font-size: .67rem; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; margin-bottom: 12px; }
.lh .hline { width: 48px; height: 2px; background: var(--gold); margin: 0 auto; border-radius: 2px; }
 
.card {
  background: var(--white); border-radius: 18px;
  box-shadow: 0 12px 48px rgba(0,0,0,.28);
  padding: 38px 42px 34px; width: 100%; max-width: 490px;
  position: relative; z-index: 1;
}

.tab-bar { display: flex; background: #edeae4; border-radius: 11px; padding: 4px; margin-bottom: 28px; gap: 4px; }
.tab-btn {
  flex: 1; padding: 11px 0; border: none; border-radius: 8px;
  cursor: pointer; font-family: Arial, Helvetica, sans-serif;
  font-size: .88rem; font-weight: 600; letter-spacing: .3px;
  transition: all .22s; color: var(--gray); background: transparent;
}
.tab-btn.active { background: var(--white); color: var(--navy); box-shadow: 0 2px 10px rgba(30,42,74,.14); }
.tab-btn:hover:not(.active) { color: var(--navy); background: rgba(255,255,255,.5); }
 
.role-tag {
  display: inline-block; font-size: .67rem; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  padding: 4px 12px; border-radius: 20px; margin-bottom: 16px;
  background: rgba(201,168,76,.15); color: var(--gold);
  border: 1px solid rgba(201,168,76,.4);
}
.role-tag.adm { background: rgba(30,42,74,.07); color: var(--navy); border-color: rgba(30,42,74,.22); }
 
.f-group { margin-bottom: 18px; }
.f-label { display: block; font-size: .71rem; font-weight: 700; letter-spacing: 1.2px; color: var(--navy); text-transform: uppercase; margin-bottom: 7px; }
.f-input {
  width: 100%; padding: 12px 14px; border: 1.5px solid #d4d0c8; border-radius: 10px;
  font-family: Arial, Helvetica, sans-serif; font-size: .93rem; color: var(--navy);
  background: var(--white); outline: none; transition: border-color .2s, box-shadow .2s;
}
.f-input::placeholder { color: #b0aaa0; }
.f-input:focus { border-color: var(--navy); box-shadow: 0 0 0 3px rgba(30,42,74,.09); }
.f-input.err { border-color: var(--error); box-shadow: 0 0 0 3px rgba(220,38,38,.09); }
.f-input.ok  { border-color: var(--ok); }
.pw-wrap { position: relative; }
.pw-wrap .f-input { padding-right: 44px; }
.pw-eye { position: absolute; right: 13px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #b0aaa0; font-size: 1rem; transition: color .2s; }
.pw-eye:hover { color: var(--navy); }
.f-err { font-size: .76rem; color: var(--error); margin-top: 5px; display: none; align-items: center; gap: 5px; }
.f-err.show { display: flex; }
.f-err::before { content: '⚠'; }
 
.btn-main {
  width: 100%; padding: 14px; background: var(--navy); color: var(--gold);
  border: none; border-radius: 10px; font-size: .97rem; font-weight: 700;
  letter-spacing: .4px; cursor: pointer; margin-top: 6px;
  transition: background .2s, transform .1s, box-shadow .2s;
  box-shadow: 0 3px 14px rgba(30,42,74,.25);
}
.btn-main:hover { background: var(--navy-l); box-shadow: 0 5px 20px rgba(30,42,74,.35); }
.btn-main:active { transform: scale(.98); }
.btn-main:disabled { background: #c5c0b8; color: #e8e4dc; cursor: not-allowed; box-shadow: none; }
 
.or-div { display: flex; align-items: center; gap: 12px; margin: 22px 0 16px; color: #b8b2a8; font-size: .82rem; }
.or-div::before, .or-div::after { content: ''; flex: 1; height: 1px; background: #e2ddd6; }
.link-row { text-align: center; font-size: .88rem; color: var(--gray); }
.gold-link { color: var(--gold-dk); font-weight: 600; text-decoration: none; transition: color .2s; }
.gold-link:hover { color: var(--gold); text-decoration: underline; }
 
#toast {
  position: fixed; top: 22px; left: 50%;
  transform: translateX(-50%) translateY(-90px);
  padding: 12px 26px; border-radius: 10px; font-size: .87rem; font-weight: 700;
  color: #fff; background: var(--error);
  box-shadow: 0 4px 22px rgba(0,0,0,.22); z-index: 9999;
  transition: transform .35s cubic-bezier(.34,1.56,.64,1); white-space: nowrap; pointer-events: none;
}
#toast.show { transform: translateX(-50%) translateY(0); }
#toast.ok { background: var(--ok); }
 
@media (max-width: 520px) {
  .card { padding: 28px 20px 24px; }
  .lh h1 { font-size: 1.7rem; }
}
</style>
</head>
<body>
<div id="toast"></div>
 
<div class="lh">
  <div class="logo-ring">
    <img src="logo.png" alt="NEU Logo"/>
  </div>
  <h1>NEU <em>Library</em></h1>
  <p class="sub">Library Visitor Log</p>
  <div class="hline"></div>
</div>
 
<div class="card">
  <div class="tab-bar">
    <button class="tab-btn active" id="t-vis" onclick="switchTab('vis')">Visitor</button>
    <button class="tab-btn"        id="t-adm" onclick="switchTab('adm')">Admin</button>
  </div>
 
  <div id="form-vis">
    <div class="f-group">
      <label class="f-label" for="ve">Email / Student ID</label>
      <input class="f-input" id="ve" type="text" placeholder="user@neu.edu.ph or 12-34567-890" autocomplete="username"/>
      <div class="f-err" id="ve-err">Please enter your @neu.edu.ph email or Student ID.</div>
    </div>
    <div class="f-group">
      <label class="f-label" for="vp">Password</label>
      <div class="pw-wrap">
        <input class="f-input" id="vp" type="password" placeholder="Enter your password" autocomplete="current-password"/>
        <button class="pw-eye" type="button" onclick="togglePw('vp',this)">👁</button>
      </div>
      <div class="f-err" id="vp-err">Incorrect password. Please try again.</div>
    </div>
    <button class="btn-main" id="vis-btn" onclick="doVisLogin()">Log In</button>
    <div class="or-div">or</div>
    <div class="link-row">New member? <a class="gold-link" href="register.html">Sign Up</a></div>
  </div>
 
  <div id="form-adm" style="display:none">
    <div class="role-tag adm">🔒 Admin Portal Access</div>
    <div class="f-group">
      <label class="f-label" for="ae">Institutional Email</label>
      <input class="f-input" id="ae" type="email" placeholder="admin@neu.edu.ph" autocomplete="username"/>
      <div class="f-err" id="ae-err">Use your @neu.edu.ph institutional email.</div>
    </div>
    <div class="f-group">
      <label class="f-label" for="ap">Password</label>
      <div class="pw-wrap">
        <input class="f-input" id="ap" type="password" placeholder="Enter admin password" autocomplete="current-password"/>
        <button class="pw-eye" type="button" onclick="togglePw('ap',this)">👁</button>
      </div>
      <div class="f-err" id="ap-err">Invalid admin credentials.</div>
    </div>
    <button class="btn-main" id="adm-btn" style="margin-top:8px" onclick="doAdmLogin()">Login as Admin</button>
  </div>
</div>
 
<script>
function hash(pw) { return btoa(pw); }
 
function toast(msg, ok = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = ok ? 'show ok' : 'show';
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 3200);
}
 
function togglePw(id, btn) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
  btn.textContent = el.type === 'password' ? '👁' : '︵';
}
 
function switchTab(role) {
  const isV = role === 'vis';
  document.getElementById('t-vis').classList.toggle('active', isV);
  document.getElementById('t-adm').classList.toggle('active', !isV);
  document.getElementById('form-vis').style.display = isV ? 'block' : 'none';
  document.getElementById('form-adm').style.display = isV ? 'none'  : 'block';
  clearErrs();
}
 
function clearErrs() {
  document.querySelectorAll('.f-input').forEach(e => e.classList.remove('err', 'ok'));
  document.querySelectorAll('.f-err').forEach(e => e.classList.remove('show'));
}
 
async function doVisLogin() {
  clearErrs();
  const em  = document.getElementById('ve').value.trim();
  const pw  = document.getElementById('vp').value;
  const btn = document.getElementById('vis-btn');
 
  if (!em) {
    document.getElementById('ve').classList.add('err');
    document.getElementById('ve-err').classList.add('show');
    toast('Please enter your email or Student ID.');
    return;
  }
  if (!pw) {
    document.getElementById('vp').classList.add('err');
    document.getElementById('vp-err').textContent = 'Password is required.';
    document.getElementById('vp-err').classList.add('show');
    toast('Please enter your password.');
    return;
  }
  if (!em.endsWith('@neu.edu.ph') && !/^\d{2}-\d+/.test(em)) {
    document.getElementById('ve').classList.add('err');
    document.getElementById('ve-err').textContent = 'Use your @neu.edu.ph email or Student ID (e.g. 12-34567-890).';
    document.getElementById('ve-err').classList.add('show');
    toast('Invalid email or ID format.');
    return;
  }
 
  btn.disabled = true;
  btn.textContent = 'Logging in…';
 
  const isEmail = em.includes('@');
  const { data: found, error } = await db
    .from('neu_users')
    .select('*')
    .eq(isEmail ? 'email' : 'id_number', em)
    .eq('password', hash(pw))
    .maybeSingle();
 
  btn.disabled = false;
  btn.textContent = 'Log In';
 
  if (error || !found) {
    document.getElementById('ve').classList.add('err');
    document.getElementById('vp').classList.add('err');
    document.getElementById('vp-err').textContent = 'Incorrect email/ID or password.';
    document.getElementById('vp-err').classList.add('show');
    toast('Invalid login. Please check your credentials.');
    return;
  }
 
  const user = {
    fullName:   found.full_name,
    idNumber:   found.id_number,
    role:       found.role,
    yearLevel:  found.year_level,
    department: found.department,
    course:     found.course,
    email:      found.email,
    position:   found.position || null   
  };
 
  localStorage.setItem('neu_cur_user', JSON.stringify(user));
  toast('Login successful! Redirecting…', true);
  setTimeout(() => window.location.href = 'visitor-dashboard.html', 1000);
}
 
async function doAdmLogin() {
  clearErrs();
  const em  = document.getElementById('ae').value.trim();
  const pw  = document.getElementById('ap').value;
  const btn = document.getElementById('adm-btn');
 
  if (!em) {
    document.getElementById('ae').classList.add('err');
    document.getElementById('ae-err').classList.add('show');
    toast('Please enter your institutional email.');
    return;
  }
  if (!pw) {
    document.getElementById('ap').classList.add('err');
    document.getElementById('ap-err').textContent = 'Password is required.';
    document.getElementById('ap-err').classList.add('show');
    toast('Please enter your password.');
    return;
  }
  if (!em.endsWith('@neu.edu.ph')) {
    document.getElementById('ae').classList.add('err');
    document.getElementById('ae-err').textContent = 'Use your @neu.edu.ph institutional email.';
    document.getElementById('ae-err').classList.add('show');
    toast('Invalid email format.');
    return;
  }
 
  btn.disabled = true;
  btn.textContent = 'Verifying…';
 
  const { data: admin, error } = await db
    .from('neu_admins')
    .select('*')
    .eq('email', em)
    .eq('password', hash(pw))
    .maybeSingle();
 
  btn.disabled = false;
  btn.textContent = 'Login as Admin';
 
  if (error || !admin) {
    document.getElementById('ae').classList.add('err');
    document.getElementById('ap').classList.add('err');
    document.getElementById('ap-err').textContent = 'Invalid admin credentials.';
    document.getElementById('ap-err').classList.add('show');
    toast('Access denied. Wrong credentials.');
    return;
  }
 
  localStorage.setItem('neu_admin', 'true');
  localStorage.setItem('neu_admin_em', em);
  toast('Admin access granted!', true);
  setTimeout(() => window.location.href = 'admin-dashboard.html', 1000);
}
 
if (new URLSearchParams(window.location.search).get('tab') === 'admin') {
  switchTab('adm');
}
 
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const admVisible = document.getElementById('form-adm').style.display !== 'none';
  if (admVisible) doAdmLogin(); else doVisLogin();
});
</script>
</body>
</html>
